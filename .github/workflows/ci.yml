name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 and luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.1 luarocks > /dev/null
          sudo luarocks install luacheck > /dev/null

      - name: Lua syntax check
        run: |
          echo "Checking Lua syntax with luac5.1 -p ..."
          FAIL=0
          while IFS= read -r -d '' f; do
            if ! OUTPUT=$(luac5.1 -p "$f" 2>&1); then
              echo "::error file=$f::Lua syntax error: $OUTPUT"
              FAIL=1
            fi
          done < <(find common/media/lua -name '*.lua' -print0)
          exit $FAIL

      - name: Luacheck
        run: luacheck common/media/lua/

      - name: Version consistency (5 locations)
        run: |
          V_ROOT=$(grep -oP 'modversion=\K[0-9]+\.[0-9]+\.[0-9]+' mod.info)
          V_4214=$(grep -oP 'modversion=\K[0-9]+\.[0-9]+\.[0-9]+' 42.14/mod.info)
          V_4215=$(grep -oP 'modversion=\K[0-9]+\.[0-9]+\.[0-9]+' 42.15/mod.info)
          V_CHANGELOG=$(grep -oP 'local PCP_VERSION\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' common/media/lua/client/PCP_ChangelogPopup.lua)
          V_MIGRATION=$(grep -oP 'local MOD_VERSION\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' common/media/lua/server/PCP_MigrationSystem.lua)

          echo "mod.info (root)       = $V_ROOT"
          echo "42.14/mod.info        = $V_4214"
          echo "42.15/mod.info        = $V_4215"
          echo "PCP_ChangelogPopup    = $V_CHANGELOG"
          echo "PCP_MigrationSystem   = $V_MIGRATION"

          FAIL=0
          if [ "$V_ROOT" != "$V_4214" ]; then
            echo "::error::Version mismatch: mod.info=$V_ROOT vs 42.14/mod.info=$V_4214"
            FAIL=1
          fi
          if [ "$V_ROOT" != "$V_4215" ]; then
            echo "::error::Version mismatch: mod.info=$V_ROOT vs 42.15/mod.info=$V_4215"
            FAIL=1
          fi
          if [ "$V_ROOT" != "$V_CHANGELOG" ]; then
            echo "::error::Version mismatch: mod.info=$V_ROOT vs PCP_ChangelogPopup=$V_CHANGELOG"
            FAIL=1
          fi
          if [ "$V_ROOT" != "$V_MIGRATION" ]; then
            echo "::error::Version mismatch: mod.info=$V_ROOT vs PCP_MigrationSystem=$V_MIGRATION"
            FAIL=1
          fi
          if [ "$FAIL" = "0" ]; then
            echo "All 5 version locations match: $V_ROOT"
          fi
          exit $FAIL

      - name: Sandbox translation completeness (JSON - 42.15)
        run: |
          python3 <<'PYEOF'
          import re, sys

          with open("common/media/sandbox-options.txt") as f:
              opts_text = f.read()

          with open("42.15/media/lua/shared/Translate/EN/Sandbox.json") as f:
              trans_text = f.read()

          fail = False

          option_blocks = re.split(r'\n\s*(?=option\s)', opts_text)
          for block in option_blocks:
              trans_match = re.search(r'translation\s*=\s*(\w+)', block)
              if not trans_match:
                  continue
              key = trans_match.group(1)
              label_key = f"Sandbox_{key}"
              tooltip_key = f"Sandbox_{key}_tooltip"
              if label_key not in trans_text:
                  print(f"::error::Missing JSON translation key: {label_key}")
                  fail = True
              if tooltip_key not in trans_text:
                  print(f"::error::Missing JSON translation key: {tooltip_key}")
                  fail = True

              num_match = re.search(r'numValues\s*=\s*(\d+)', block)
              if num_match:
                  num_values = int(num_match.group(1))
                  for i in range(1, num_values + 1):
                      option_key = f"Sandbox_{key}_option{i}"
                      if option_key not in trans_text:
                          print(f"::error::Missing JSON enum translation key: {option_key}")
                          fail = True

          for m in re.finditer(r'page\s*=\s*(\w+)', opts_text):
              page_key = f"Sandbox_{m.group(1)}"
              if page_key not in trans_text:
                  print(f"::error::Missing JSON page title key: {page_key}")
                  fail = True

          if fail:
              sys.exit(1)
          print("All sandbox translation keys present in JSON (42.15).")
          PYEOF

      - name: Sandbox translation completeness (Lua - 42.14)
        run: |
          python3 <<'PYEOF'
          import re, sys

          with open("common/media/sandbox-options.txt") as f:
              opts_text = f.read()

          with open("42.14/media/lua/shared/Translate/EN/Sandbox_EN.txt") as f:
              trans_text = f.read()

          fail = False

          option_blocks = re.split(r'\n\s*(?=option\s)', opts_text)
          for block in option_blocks:
              trans_match = re.search(r'translation\s*=\s*(\w+)', block)
              if not trans_match:
                  continue
              key = trans_match.group(1)
              label_key = f"Sandbox_{key}"
              tooltip_key = f"Sandbox_{key}_tooltip"
              if label_key not in trans_text:
                  print(f"::error::Missing Lua translation key: {label_key}")
                  fail = True
              if tooltip_key not in trans_text:
                  print(f"::error::Missing Lua translation key: {tooltip_key}")
                  fail = True

              num_match = re.search(r'numValues\s*=\s*(\d+)', block)
              if num_match:
                  num_values = int(num_match.group(1))
                  for i in range(1, num_values + 1):
                      option_key = f"Sandbox_{key}_option{i}"
                      if option_key not in trans_text:
                          print(f"::error::Missing Lua enum translation key: {option_key}")
                          fail = True

          for m in re.finditer(r'page\s*=\s*(\w+)', opts_text):
              page_key = f"Sandbox_{m.group(1)}"
              if page_key not in trans_text:
                  print(f"::error::Missing Lua page title key: {page_key}")
                  fail = True

          if fail:
              sys.exit(1)
          print("All sandbox translation keys present in Lua (42.14).")
          PYEOF

      - name: Icon coverage
        run: |
          python3 <<'PYEOF'
          import re, os, sys, glob

          script_files = glob.glob("common/media/scripts/*.txt") + \
                         glob.glob("common/media/scripts/**/*.txt", recursive=True)
          pcp_icons = set()

          for sf in script_files:
              with open(sf) as f:
                  for line in f:
                      m = re.search(r'Icon\s*=\s*(PCP_\w+)', line)
                      if m:
                          pcp_icons.add(m.group(1))

          fail = False
          for icon_name in sorted(pcp_icons):
              texture_path = f"common/media/textures/Item_{icon_name}.png"
              if not os.path.isfile(texture_path):
                  print(f"::error::Missing texture for Icon={icon_name}: expected {texture_path}")
                  fail = True

          if fail:
              sys.exit(1)
          print(f"All {len(pcp_icons)} PCP icon(s) have matching textures.")
          PYEOF

      - name: OnCreate callback modules
        run: |
          python3 <<'PYEOF'
          import re, os, sys, glob

          script_files = glob.glob("common/media/scripts/*.txt") + \
                         glob.glob("common/media/scripts/**/*.txt", recursive=True)
          modules = set()

          for sf in script_files:
              with open(sf) as f:
                  for line in f:
                      m = re.search(r'OnCreate\s*=\s*(\w+)\.\w+', line)
                      if m:
                          modules.add(m.group(1))

          lua_files = set()
          for root, dirs, files in os.walk("common/media/lua"):
              for fn in files:
                  if fn.endswith(".lua"):
                      lua_files.add(fn[:-4])

          fail = False
          for mod_name in sorted(modules):
              if mod_name not in lua_files:
                  print(f"::error::OnCreate references module '{mod_name}' but {mod_name}.lua not found under common/media/lua/")
                  fail = True

          if fail:
              sys.exit(1)
          print(f"All {len(modules)} OnCreate module(s) resolved.")
          PYEOF

      - name: Recipe/Item translation coverage
        run: |
          python3 <<'PYEOF'
          import re, json, sys, glob, os

          MODULE = "PhobosChemistryPathways"
          fail = False

          # --- Extract recipe names from script files ---
          recipe_names = set()
          for sf in glob.glob("common/media/scripts/recipes/*.txt"):
              with open(sf) as f:
                  for m in re.finditer(r'craftRecipe\s+(\w+)', f.read()):
                      recipe_names.add(m.group(1))

          # --- Extract item names from item script files (PCP module only) ---
          item_names = set()
          for sf in glob.glob("common/media/scripts/items/*.txt"):
              with open(sf) as f:
                  content = f.read()
              # Only process blocks inside module PhobosChemistryPathways
              for block in re.finditer(
                  r'module\s+PhobosChemistryPathways\s*\{(.*?)^\}',
                  content, re.DOTALL | re.MULTILINE
              ):
                  for m in re.finditer(r'\bitem\s+(\w+)\s*\{', block.group(1)):
                      item_names.add(m.group(1))

          print(f"Found {len(recipe_names)} recipes, {len(item_names)} items in scripts")

          # --- Check 42.15 JSON translations ---
          with open("42.15/media/lua/shared/Translate/EN/Recipes.json") as f:
              recipes_json = json.load(f)
          with open("42.15/media/lua/shared/Translate/EN/ItemName.json") as f:
              items_json = json.load(f)

          for name in sorted(recipe_names):
              if name not in recipes_json:
                  print(f"::error::42.15 Recipes.json missing key: {name}")
                  fail = True

          for name in sorted(item_names):
              qualified = f"{MODULE}.{name}"
              if qualified not in items_json:
                  print(f"::error::42.15 ItemName.json missing key: {qualified}")
                  fail = True

          # --- Check 42.14 Lua translations ---
          with open("42.14/media/lua/shared/Translate/EN/Recipes_EN.txt") as f:
              recipes_lua = f.read()
          with open("42.14/media/lua/shared/Translate/EN/ItemName_EN.txt") as f:
              items_lua = f.read()

          for name in sorted(recipe_names):
              prefixed = f"Recipe_{name}"
              if prefixed not in recipes_lua:
                  print(f"::error::42.14 Recipes_EN.txt missing key: {prefixed}")
                  fail = True

          for name in sorted(item_names):
              prefixed = f"ItemName_{MODULE}.{name}"
              if prefixed not in items_lua:
                  print(f"::error::42.14 ItemName_EN.txt missing key: {prefixed}")
                  fail = True

          if fail:
              sys.exit(1)
          print("All recipe/item translation keys present in both formats.")
          PYEOF

      - name: Translation key prefix guard (42.15 JSON)
        run: |
          python3 <<'PYEOF'
          import json, sys

          fail = False
          checks = [
              ("42.15/media/lua/shared/Translate/EN/Recipes.json", "Recipe_"),
              ("42.15/media/lua/shared/Translate/EN/ItemName.json", "ItemName_"),
          ]
          for fname, prefix in checks:
              with open(fname) as f:
                  data = json.load(f)
              bad = [k for k in data if k.startswith(prefix)]
              if bad:
                  for k in bad[:10]:
                      print(f"::error file={fname}::Key '{k}' has invalid '{prefix}' prefix (should be bare)")
                  if len(bad) > 10:
                      print(f"::error file={fname}::... and {len(bad) - 10} more")
                  fail = True

          if fail:
              sys.exit(1)
          print("No invalid prefixes found in 42.15 JSON translation files.")
          PYEOF

      - name: StaticModel/WorldStaticModel validation
        run: |
          python3 <<'PYEOF'
          import re, sys, glob

          # Load vanilla model allowlist
          with open("scripts/vanilla_models_allowlist.txt") as f:
              valid = set(line.strip() for line in f if line.strip() and not line.startswith("#"))

          # Extract and validate model references from item scripts
          fail = False
          checked = 0
          for sf in sorted(glob.glob("common/media/scripts/items/*.txt")):
              with open(sf) as f:
                  for i, line in enumerate(f, 1):
                      m = re.search(r'(?:Static|WorldStatic)Model\s*=\s*(\w+)', line)
                      if m:
                          name = m.group(1)
                          checked += 1
                          if name not in valid:
                              print(f"::error file={sf},line={i}::Unknown model '{name}' — not in scripts/vanilla_models_allowlist.txt")
                              fail = True

          if fail:
              sys.exit(1)
          print(f"All {checked} StaticModel/WorldStaticModel references are valid.")
          PYEOF

      - name: Encoding check (UTF-8)
        run: |
          FAIL=0
          for dir in common/media 42.14/media 42.15/media; do
            if [ -d "$dir" ]; then
              while IFS= read -r -d '' f; do
                if ! python3 -c "open('$f', encoding='utf-8').read()" 2>/dev/null; then
                  echo "::error file=$f::Non-UTF-8 encoding detected"
                  FAIL=1
                fi
              done < <(find "$dir" \( -name '*.lua' -o -name '*.txt' -o -name '*.json' \) -print0)
            fi
          done
          if [ "$FAIL" = "0" ]; then
            echo "All files are valid UTF-8."
          fi
          exit $FAIL
